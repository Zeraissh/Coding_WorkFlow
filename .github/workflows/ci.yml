name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - if: runner.os == 'Windows'
        run: npm ci --ignore-scripts
      - if: runner.os != 'Windows'
        run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
